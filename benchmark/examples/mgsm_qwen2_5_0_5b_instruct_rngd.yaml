# How to use

# 1. copy this file
# 2. change the configs for favorable evaluation settings
# 3. run 'furiosa-bench run --config config.yaml'

# Unique identifier name for the evaluation task
name: mgsm_qwen2_5_0_5b_instruct_rngd

execution:
  # Execution environment type (local: local machine, remote: remote server, etc.)
  type: local
  # Output directory path where evaluation results will be saved
  output_dir: mgsm_qwen2_5_0_5b_instruct_results
  # Benchmark workspace where the evaluation will be executed
  workspace: workspace

deployment:
  # Deployment type
  # furiosa-llm: uses Furiosa AI's LLM deployment system to evaluate the model on RNGDs
  # vllm: uses open-source LLM serving framework to evaluate the model on GPU
  type: furiosa-llm
  # Model name registered on Hugging Face
  model_id: furiosa-ai/Qwen2.5-0.5B-Instruct
  tensor_parallel_size: 8
  data_parallel_size: 1
  port: 8003
  # specify device indexes to monitor usage and
  # set environment variables for device selection
  # extra_args: --devices for furiosa-llm, CUDA_VISIBLE_DEVICES for gpu
  devices: [3]

benchmark:
  # The benchmark task to run
  task: mgsm
  config:
    # Additional arguments for the benchmark task (currently empty)
    use_endpoint_type: completions
